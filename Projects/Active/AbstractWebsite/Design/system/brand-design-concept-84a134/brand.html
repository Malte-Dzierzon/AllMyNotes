hnical labels, timestamps |\n| border | #d9dee7 | Border | Rules, dividers, thin strokes |\n| accent | #1677ff | Cold Neon Blue | Primary actions, links, emphasis \u2014 use once or twice per view, never as large wash |\n| accent-secondary | #5bb8c4 | Desaturated Cyan | Secondary accent, subtle decorative elements, accent-text on dark backgrounds |\n\n### Typography\n\n- **Display:** Elms Sans / Inter fallback\n- **Body:** Inter\n- **Mono:** IBM Plex Mono\n\n### Spacing\n\nFluid scale: 4, 8, 16, 24, 32, 48, 64, 96px\n\n### Motion\n\n- Easing: cubic-bezier(0.4, 0, 0.2, 1)\n- Durations: fast 150ms, base 300ms, slow 600ms, cinematic 1200ms\n\n---\n\n## Logo\n\nPrimary: imagery/Dropped-Image-3-.webp\n\nAlternates:\n- imagery/Dropped-Image-7-.webp\n- imagery/Dropped-Image-8-.webp\n- imagery/Dropped-Image-9-.webp\n\nNo logo supplied in pasted DESIGN.md. System uses typographic wordmark in Elms Sans or Inter instead.\n\n---\n\n## Voice & Tone\n\n**Tone:** Editorial, atmospheric, and emotionally engaging. Reads like a digital art exhibition or experimental magazine \u2014 calm but not sleepy, melancholic but not depressing, futuristic but not loud. Avoid playful, overly friendly, or corporate marketing tone. Text is part of the visual composition, not just information delivery.\n\n**Keywords:** atmosphere, texture, signal, glow, static, drift, echo, noise, transmission, decay, horizon, void, fade, pulse\n\n**Avoid:** innovative, disruptive, revolutionary, game-changing, cutting-edge, seamless, robust, scalable, user-friendly, next-gen\n\n**Pillars:**\n- Textured digital atmosphere: driven by grain, scanlines, bloom, and analog artifacts rather than flat minimalism\n- Cold cinematic palette: restrained navy, cool white, desaturated cyan, and subtle silver glow \u2014 never bright neon or warm beige\n- Editorial typography: large expressive headlines, asymmetric compositions, generous whitespace, Japanese glyphs as visual texture\n- Magazine-inspired layout: free-form composition, layered blocks at different scales, poster-like spreads\n- Slow atmospheric motion: floating textures, CRT flicker, gentle parallax \u2014 never fast or playful\n\n**Vocabulary:**\n- **Use:** atmosphere \u00b7 texture \u00b7 signal \u00b7 glow \u00b7 static \u00b7 drift \u00b7 echo \u00b7 noise \u00b7 transmission \u00b7 decay \u00b7 horizon \u00b7 void \u00b7 fade \u00b7 pulse\n- **Avoid:** innovative \u00b7 disruptive \u00b7 revolutionary \u00b7 game-changing \u00b7 cutting-edge \u00b7 seamless \u00b7 robust \u00b7 scalable \u00b7 user-friendly \u00b7 next-gen\n\n---\n\n## Imagery & Layout\n\n**Philosophy:** Textures over colors. Grain, noise, scanlines, dithering, halftone patterns, light leaks, bloom, and compression artifacts as primary visual texture. Everything feels slightly imperfect, organic, and aged-digital.\n\n**Subjects:** Vintage CRT screens and monitor glow, Abstract light and signal artifacts, Cold industrial and architectural spaces, Ambient digital landscapes, Textural abstract compositions\n\n**Treatment:** Apply film grain overlay, CRT scanline pattern, soft vignette, subtle bloom on light sources, and light leak gradients. Use JPEG/video compression artifacts as stylistic texture. Everything should feel like it was captured through imperfect analog-to-digital conversion.\n\n**Avoid:** Clean product photography, Flat illustrations, Vector art, Stock corporate imagery, Bright saturated colors, Warm beige tones, Playful or cartoon imagery\n\n**Layout Posture:**\n- Editorial layout: each section feels like its own cover page, poster, or editorial spread\n- Free-form composition: layered and overlapping elements. Never strictly rectangular grid sections\n- Asymmetric balance: generous whitespace on one side, dense content on the other. Avoid centering everything\n- Blocks at different scales: mix full-bleed hero blocks with small metadata panels and wide typographic spreads\n- Japanese typography as texture: use kana/kanji glyphs as decorative design elements in headings and overlays\n- Zero border-radius throughout: all UI elements are strictly rectangular with square corners (0px radius)\n- Text is design: typography is part of the visual composition, not just content delivery\n- Component kit should cover: Button, Card, Form, Navigation \u2014 all rectangular, minimal, with subtle glow interaction states\n- Pin overlays consistently: badges and labels over images sit fully inside bounds with solid-panel background and shadow\n- Charts use fills, not bare outlines: data visualization encodes through area/volume, not thin strokes\n- Slow, atmospheric motion: noise textures, CRT flicker, gentle parallax, fade transitions. Duration 0.3\u20131.2s. Ease: cubic-bezier(0.4, 0, 0.2, 1)\n- Texture overlays: film grain, scanlines, vignette, bloom \u2014 applied as CSS pseudo-elements or overlay layers\n\n**Gallery:**\n- Signal Artifacts (Texture) \u2014 imagery/Dropped-Image-7-.webp\n- Industrial Landscape (Environment) \u2014 imagery/Dropped-Image-8-.webp\n- Digital Decay (Abstract) \u2014 imagery/Dropped-Image-9-.webp\n\n---\n\n## Design System\n\n**Status:** Production Ready v1.0.0\n\n**Source:** DESIGN.md + brand toolkit\n\n**Files:**\n- DESIGN.md \u2014 Full design system (13 sections)\n- brand.html \u2014 This visual preview\n- brand.json \u2014 Structured brand data\n- AGENT.md \u2014 Agent workspace docs\n- imagery/ \u2014 4 reference images (logo + 3 gallery)\n\n---\n\n*Retro Poster Blue \u2014 Built with Three.js post-processing via CDN importmap. No build tools.*","locale":"de","copy":{"ready":"BRAND READY","extracting":"EXTRACTING...","draft":"DRAFT","failed":"FAILED","copy":"COPY JSON","copied":"COPIED!","viewDesign":"VIEW DESIGN.MD","viewJson":"VIEW JSON","toggleTheme":"TOGGLE THEME","viewGallery":"VIEW GALLERY","close":"CLOSE","lightboxPrev":"PREVIOUS","lightboxNext":"NEXT"}}}</script>

/* ============================================
   RETRO POSTER BLUE — Design System Preview
   Version: 2.0.0 — Dark/Light Mode + Animations
   ============================================ */

/* ---- 1. Design Tokens (Light Theme Default) ---- */
:root {
  /* Light theme */
  --bg: #ffffff;
  --bg-elevated: #f7f8fa;
  --bg-panel: #ffffff;
  --fg: #111111;
  --fg-secondary: #2a2a2a;
  --fg-muted: #6b7280;
  --fg-faint: #9ca3af;
  --border: #d9dee7;
  --border-subtle: #e5e9f0;
  --accent: #1677ff;
  --accent-hover: #4096ff;
  --accent-secondary: #5bb8c4;
  --accent-glow: rgba(22,119,255,0.12);
  --accent-glow-strong: rgba(22,119,255,0.25);
  --leak-cyan: rgba(91,184,196,0.06);
  --shadow: rgba(0,0,0,0.04);
  --shadow-elevated: rgba(0,0,0,0.08);
  --shadow-strong: rgba(0,0,0,0.15);

  --font-display: "Elms Sans", "Inter", system-ui, sans-serif;
  --font-body: "Inter", system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 16px;
  --space-4: 24px;
  --space-5: 32px;
  --space-6: 48px;
  --space-7: 64px;
  --space-8: 96px;

  --easing: cubic-bezier(0.4, 0, 0.2, 1);
  --easing-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --motion-fast: 150ms;
  --motion-base: 300ms;
  --motion-slow: 600ms;
  --motion-cinematic: 1200ms;

  --radius: 0;
  --radius-sm: 0;
  --radius-lg: 0;

  --z-overlay: 1000;
  --z-modal: 2000;
  --z-toast: 3000;
}

/* ---- Dark Theme ---- */
[data-theme="dark"] {
  --bg: #0a0d12;
  --bg-elevated: #0f141a;
  --bg-panel: #141a22;
  --fg: #f0f2f5;
  --fg-secondary: #d1d5db;
  --fg-muted: #9ca3af;
  --fg-faint: #6b7280;
  --border: #2a3240;
  --border-subtle: #1e2632;
  --accent: #4096ff;
  --accent-hover: #60a5fa;
  --accent-secondary: #5bb8c4;
  --accent-glow: rgba(64,150,255,0.15);
  --accent-glow-strong: rgba(64,150,255,0.35);
  --leak-cyan: rgba(91,184,196,0.08);
  --shadow: rgba(0,0,0,0.3);
  --shadow-elevated: rgba(0,0,0,0.5);
  --shadow-strong: rgba(0,0,0,0.7);

  /* Invert images slightly in dark mode for CRT feel */
  --img-filter: grayscale(15%) contrast(105%) saturate(0.85);
}

/* ---- 2. Reset & Base ---- */
*, *::before, *::after { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color var(--motion-base) var(--easing), color var(--motion-base) var(--easing);
}

a { color: var(--accent); text-decoration: none; transition: color var(--motion-fast) var(--easing); }
a:hover { color: var(--accent-hover); }
img { display: block; max-width: 100%; }
::selection { background: var(--accent); color: #fff; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ---- 3. Texture Overlays (Global, always on top) ---- */
.grain-overlay,
.scanlines,
.vignette,
.light-leak {
  position: fixed;
  inset: 0;
  z-index: var(--z-overlay);
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--motion-slow) var(--easing);
}

[data-theme="light"] .grain-overlay { opacity: 0.035; }
[data-theme="dark"] .grain-overlay { opacity: 0.06; }

.grain-overlay {
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  mix-blend-mode: multiply;
  animation: grain-shift 8s steps(10) infinite;
}

@keyframes grain-shift {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-2px, 1px); }
  20% { transform: translate(1px, -1px); }
  30% { transform: translate(-1px, 2px); }
  40% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 1px); }
  60% { transform: translate(1px, 2px); }
  70% { transform: translate(-1px, -1px); }
  80% { transform: translate(2px, 0); }
  90% { transform: translate(-1px, 1px); }
}

[data-theme="light"] .scanlines { opacity: 0.08; }
[data-theme="dark"] .scanlines { opacity: 0.12; }

.scanlines {
  background-image: repeating-linear-gradient(
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.02) 2px,
    rgba(0,0,0,0.02) 3px
  );
  background-size: 100% 4px;
  animation: scanline-flicker 0.15s infinite alternate;
}

@keyframes scanline-flicker {
  0% { opacity: 0.08; }
  100% { opacity: 0.12; }
}

[data-theme="dark"] .scanlines { animation-duration: 0.1s; }

.vignette {
  background: radial-gradient(
    ellipse at center,
    transparent 50%,
    rgba(0,0,0,0.15) 100%
  );
  opacity: 0.6;
}

[data-theme="dark"] .vignette {
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(0,0,0,0.4) 100%
  );
  opacity: 0.8;
}

.light-leak {
  background: linear-gradient(135deg,
    rgba(91,184,196,0.03) 0%,
    transparent 40%,
    transparent 60%,
    rgba(22,119,255,0.03) 100%
  );
  opacity: 0.4;
  mix-blend-mode: screen;
}

/* ---- 4. Typography ---- */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.0;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--fg);
}

.display-xl { font-size: clamp(48px, 8vw, 120px); font-weight: 800; letter-spacing: -0.04em; line-height: 0.85; }
.display-l  { font-size: clamp(36px, 5vw, 72px); font-weight: 800; letter-spacing: -0.03em; line-height: 0.9; }
.display-m  { font-size: clamp(28px, 3.5vw, 48px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.0; }
.display-s  { font-size: clamp(22px, 2.5vw, 32px); font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; }

.mono-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--fg-muted);
}

.mono-body {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg-secondary);
}

/* ---- 5. Layout ---- */
.wrap {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 var(--space-6) var(--space-8);
}

.sec {
  margin-top: var(--space-7);
  padding-top: var(--space-6);
  border-top: 1px solid var(--border-subtle);
  position: relative;
}

.sec::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 60px;
  height: 1px;
  background: var(--accent);
}

.sec-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin: 0 0 var(--space-5);
}

/* Asymmetric Grid */
.grid {
  display: grid;
  gap: var(--space-5);
}

.grid-2 { grid-template-columns: 1fr; }
.grid-3 { grid-template-columns: 1fr; }
.grid-asym { grid-template-columns: 1fr; }

@media (min-width: 860px) {
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .grid-asym { grid-template-columns: 1.2fr 1fr; }
}

@media (min-width: 1200px) {
  .grid-asym { grid-template-columns: 1.5fr 1fr; }
}

/* Panel / Card */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  padding: var(--space-5);
  position: relative;
  overflow: hidden;
  transition: border-color var(--motion-base) var(--easing), box-shadow var(--motion-base) var(--easing), transform var(--motion-base) var(--easing);
}

.panel:hover {
  border-color: var(--accent);
  box-shadow: 0 8px 32px var(--shadow-elevated);
  transform: translateY(-2px);
}

.panel::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  opacity: 0;
  transition: opacity var(--motion-base) var(--easing);
}

.panel:hover::before { opacity: 1; }

/* ---- 6. Theme Toggle ---- */
.theme-toggle {
  position: fixed;
  top: var(--space-4);
  right: var(--space-4);
  z-index: var(--z-toast);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-muted);
  cursor: pointer;
  transition: all var(--motion-base) var(--easing);
}

.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 4px 20px var(--accent-glow);
}

.theme-toggle:focus-visible { outline: none; }
.theme-toggle .icon { width: 18px; height: 18px; display: block; }

/* ---- 7. Hero / Kit Head ---- */
.kit-head {
  position: relative;
  padding: var(--space-8) 0 var(--space-6);
  margin: 0 calc(-1 * var(--space-6)) var(--space-7);
  padding-left: var(--space-6);
  padding-right: var(--space-6);
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

.kit-head::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--accent-secondary), transparent);
